name: Sync Backend to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 to fix the Node.js warning
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd backend
          
          git init -b main
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add .
          git commit -m "Auto-deploy from GitHub"
          
          # Ensure the space name matches exactly what is in your Hugging Face settings (with the underscore)
          git push --force https://madhurithika22:$HF_TOKEN@huggingface.co/spaces/madhurithika22/heat_treatment main

name: Sync Backend to Hugging Face Space

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Verify the token exists before trying to push
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN is empty or not set in GitHub Secrets!"
            exit 1
          fi

          cd backend
          
          # 2. Initialize and configure Git
          git init -b main
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add .
          git commit -m "Auto-deploy from GitHub"
          
          # 3. Add the remote explicitly to avoid URL parsing errors
          # Make sure 'heat_treatment' matches your Space name exactly!
          git remote add hf "https://madhurithika22:$HF_TOKEN@huggingface.co/spaces/madhurithika22/heat_treatment"
          
          # 4. Force push
          git push --force hf main
